<body>


    <div class="parent">
    <div class="div1">
 <div class="brand-title-wrap">

    <div class="headline-divider">

    <h1>Get to know your set!</h1>

    <div class="line"></div>
</div>

        <span class="color-match-label">Color Match</span>
        <div class="color-match-switch-row">
            <span id="colorMatchIncludeLabel" class="color-match-side-label">Include</span>
            <button
                id="colorMatchToggle"
                class="color-match-toggle"
                type="button"
                data-mode="include"
                aria-label="Toggle color match mode"
                aria-pressed="true"></button>
            <span id="colorMatchExactLabel" class="color-match-side-label">Exact</span>
        </div>
    </div>


<div class="mana_color_selector">

<div class="dropdown-container">

    <!-- Oberer Balken -->

    </div>

    <!-- Dropdown Inhalt -->

        <div class="menu">


            <!-- Menüeinträge -->
            <div class="menu-item" data-type="land">

            </div>

            <div class="menu-item" data-type="creature">

            </div>

            <div class="menu-item" data-type="artifact">

</div>
